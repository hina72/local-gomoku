<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local GOMOKU 2 players</title>
    <link rel = 'stylesheet' href = 'style.css'>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=replay" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class = 'header'>
        <h1>G<b>O</b>M<b>O</b>KU</h1>
        
    </div>

    <div class = 'menu'>
        <div class = 'b-setting'>
            <div>Board size</div>
            <select id = 'size'>
                <option value = '10'>10*10</option>
                <option value = '15'>15*15</option>
                <option value = '20'>20*20</option>
            </select>
        </div>
        <div class = 'b-setting'>
            <div>Timer</div>
            <select id = 'set-time'>
                <option value = '180'>3 min</option>
                <option value = '300'>5 min</option>
                <option value = '420'>7 min</option>
            </select>
        </div>
        <button class = 'start-btn' onclick = 'startGame(s)'>Start New Game</button>
    </div>
    <div class = 'el-test'></div>
    <div class = 'status'>
        <div class = 's-container'>
            <div class = 'player-name'>
                <span>Player X</span>
                <div class = 'timer'></div>
            </div>

            <div class = 'player-name'>
                <span>Player O</span>
                <div class = 'timer'></div>
            </div>
        </div>
    </div>
    <div class = 'game-over'>
        
    </div>
    <div class = 'ctn'>
        <div class = 'board'></div>
    </div>
    <div id = 'r-cnt'>
        <button id = 'restart' onclick = 'startGame(s)'><span class="material-symbols-outlined">
replay
</span></button>
    </div>

    <br>
    <br>
    <br>
    <br>
    <div class = 'footer'>
        <div>
            <b>Local 2 players Gomoku</b> - Mar 5 2026 - Huynh Khanh Hung (hina72)
        </div>
        <div class = 'links'>
            <a target='_blank' href = 'https://github.com/hina72/local-gomoku'><img src = 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/github-white-icon.png' width = '20' height = '20'>See Github Repo</a>
            <a target='_blank' href = 'https://github.com/hina72'><img src = 'https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/github-white-icon.png' width = '20' height = '20'>Github profile</a>
        </div>
    </div>
    <script src = 'main.js'></script>
</body>
</html>
